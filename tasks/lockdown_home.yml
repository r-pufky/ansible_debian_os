---
###############################################################################
# Lockdown users home directories.
###############################################################################

- name: 'Lockdown home | cmd | discovering home directories'
  ansible.builtin.command: 'ls -1 /home'
  register: os__cmd
  changed_when: false

# If no user is added, /home is empty and chmod module fails.
- name: 'Lockdown home | cmd | lockdown /home'
  when: os__cmd.stdout_lines | length > 0
  ansible.builtin.shell: 'chmod -R go-rwx /home/*'
  changed_when: false
