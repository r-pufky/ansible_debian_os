---
###############################################################################
# Debian Role Options
###############################################################################

os___release: "{{ {} | r_pufky.data.v3(

    _date='2025-08-22',
    _debian='trixie',
  ) }}"

os___app: "{{ {} | r_pufky.data.v3(

    _tmpfs='/tmp',
    _systemd_dir='/etc/systemd/system',
    _motd_file='/etc/update-motd.d/98-reboot-required',
  ) }}"

###############################################################################
# APT Packages
###############################################################################

os___packages:
  - 'rsync'  # ansible.posix.synchronize (skeleton files).
  - 'locales'  # locales management.
